name: Release Preflight

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release guard
        run: npm run release:guard
