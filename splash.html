<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Janus startet...</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            cursor: wait;
        }
        .container {
            text-align: center;
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 32px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        .status {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .sub-status {
            color: #555;
            font-size: 11px;
        }
        .update-status {
            color: #a855f7;
            font-size: 12px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
        .update-progress {
            color: #6366f1;
            font-size: 10px;
            margin-top: 5px;
            display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>JANUS</h1>
        <div class="spinner"></div>
        <div class="status">System wird initialisiert...</div>
        <div class="sub-status">Backend-Dienste werden geladen. Dies kann beim ersten Start dauern.</div>
        <div class="update-status" id="updateStatus"></div>
        <div class="update-progress" id="updateProgress"></div>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        const updateStatus = document.getElementById('updateStatus');
        const updateProgress = document.getElementById('updateProgress');
        const status = document.querySelector('.status');
        const subStatus = document.querySelector('.sub-status');

        ipcRenderer.on('update-status', (event, message) => {
            updateStatus.textContent = message;
            updateStatus.style.display = 'block';
        });

        ipcRenderer.on('update-progress', (event, message) => {
            updateProgress.textContent = message;
            updateProgress.style.display = 'block';
        });

        ipcRenderer.on('update-complete', () => {
            updateStatus.textContent = 'Update wird installiert...';
            updateProgress.style.display = 'none';
        });
    </script>
</body>
</html>
