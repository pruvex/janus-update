<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Janus</title>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="css/settings.css" />
</head>
<body>
  <div class="app-container">
    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Janus</h2>
        <button id="toggle-sidebar-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
      <nav>
        <select id="provider-select">
          <option value="openai">OpenAI</option>
          <option value="gemini">Gemini</option>
        </select>
        <select id="model-select"></select>
        <button id="settings-btn">Einstellungen</button>
        <!-- Weitere Nav-Elemente hier -->
      </nav>
    </div>
    <main id="chat-view" class="view">
      <div id="main-content">
        <div id="chat-window" class="chat-window">
          <div id="chat-header">Chat</div>
          <div id="chat-messages"></div>
          <div id="chat-input-container">
                        <form id="chat-form">
              <input type="text" id="chat-input" placeholder="Nachricht an Janus senden...">
              <button id="send-button" type="submit">Senden</button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <main id="settings-view" class="view" style="display: none;">
      <div class="settings-content">
        <h2>Einstellungen</h2>
        <form id="api-key-form">
          <select id="provider-input">
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
          </select>
          <input type="password" id="api-key-input" placeholder="API Key">
          <button type="submit">Speichern</button>
        </form>
        <h3>Gespeicherte API Keys</h3>
        <ul id="api-key-list"></ul>
        <button id="back-to-chat-btn">Zurück zum Chat</button>
      </div>
    </main>
  </div>
  <script src="js/config.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/model-catalog.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
