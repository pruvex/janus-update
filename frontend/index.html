<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Janus</title>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="css/settings.css" />
</head>
<body>
  <div class="app-container">
    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Janus</h2>
        <button id="toggle-sidebar-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
      <div id="cost-summary-widget">
        <p id="current-month-cost"></p>
        <p id="monthly-budget"></p>
      </div>
      <nav>
        <select id="provider-select">
          <option value="openai">OpenAI</option>
          <option value="gemini">Gemini</option>
        </select>
        <select id="model-select"></select>
        <button id="settings-btn">Einstellungen</button>
        <!-- Weitere Nav-Elemente hier -->
      </nav>
      <div class="sidebar-option">
        <input type="checkbox" id="show-archived-chats">
        <label for="show-archived-chats">Archivierte Chats anzeigen</label>
      </div>
      <button id="new-chat-btn">Neuer Chat</button>
      <div id="chat-list"></div>
      <div id="cost-display-section">
        
        
        
      </div>
    </div>
    <main id="chat-view" class="view">
      <div id="main-content">
        <div id="chat-window" class="chat-window">
          <div id="chat-header">Neuer Chat</div>
          <div id="chat-messages"></div>
          <div id="chat-input-container">
                        <form id="chat-form">
              <input type="text" id="chat-input" placeholder="Nachricht an Janus senden...">
              <button id="send-button" type="submit">Senden</button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <main id="settings-view" class="view" style="display: none;">
  <div class="settings-header">
    <h2>Einstellungen</h2>
  </div>
  <div class="settings-container">
    <!-- Linke Spalte: Navigation -->
    <div id="settings-nav">
      <a href="#" class="settings-nav-link active-setting" data-target="api-key-section">API Keys</a>
      <a href="#" class="settings-nav-link" data-target="model-management-section">Modellverwaltung</a>
      <button id="back-to-chat-btn">Zurück zum Chat</button>
    </div>

    <!-- Rechte Spalte: Inhalt -->
    <div id="settings-content-area">
      <!-- Sektion 1: API Key Verwaltung -->
      <div id="api-key-section" class="settings-section">
        <h3>API Key Verwaltung</h3>
        <form id="api-key-form">
          <select id="provider-input">
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
          </select>
          <input type="password" id="api-key-input" placeholder="API Key">
          <button type="submit">Speichern</button>
        </form>
        <h4>Gespeicherte API Keys</h4>
        <ul id="api-key-list"></ul>
      </div>

      <!-- Sektion 2: Modellverwaltung -->
      <div id="model-management-section" class="settings-section" style="display: none;">
        <h3>Modellverwaltung</h3>
        <form id="model-selection-form">
          <ul id="model-list"></ul>
          <button type="submit">Auswahl speichern</button>
          <button type="button" id="back-from-models-btn">Zurück</button>
        </form>
      </div>
    </div>
  </div>
</main>
  </div>
  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/settings.js"></script>
  <script type="module" src="js/chat-manager.js"></script>
  <script type="module" src="js/chat.js"></script>
  
    <script type="module" src="js/app.js"></script>
  <script type="module" src="js/cost-visualizer.js"></script>
  <div id="cost-deep-dive-modal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <h2>Kosten-Details (Deep Dive)</h2>
      <div id="deep-dive-content"></div>
    </div>
  </div>
</body>
</html>
