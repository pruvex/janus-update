<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Janus</title>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="css/settings.css" />
</head>
<body>
  <div id="dashboard">
    <div id="sidebar">
      <h2>Janus</h2>
      <nav>
        <button id="settings-btn">Einstellungen</button>
        <!-- Weitere Nav-Elemente hier -->
      </nav>
    </div>
    <div id="main-content">
      <div id="chat-window">
        <div id="chat-header">Chat</div>
        <div id="chat-messages"></div>
        <div id="chat-input-container">
          <input type="text" id="chat-input" placeholder="Nachricht an Janus senden...">
          <button id="send-btn">Senden</button>
        </div>
      </div>
    </div>
  </div>
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Einstellungen</h2>
      <form id="api-key-form">
        <input type="text" id="provider-input" placeholder="Anbieter (z.B. OpenAI)">
        <input type="password" id="api-key-input" placeholder="API Key">
        <button type="submit">Speichern</button>
      </form>
      <h3>Gespeicherte API Keys</h3>
      <ul id="api-key-list"></ul>
    </div>
  </div>
  <script src="src/main.js" type="module"></script>
  <script src="js/settings.js"></script>
</body>
</html>
